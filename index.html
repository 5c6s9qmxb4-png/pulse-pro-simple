<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json" />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .sparkline { height: 60px; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-5">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl">📈</div>
        <h1 class="text-4xl font-bold">PULSE PRO</h1>
      </div>
      <div class="text-green-400 text-sm flex items-center gap-2">
        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
        LIVE • VERCEL
      </div>
    </div>

    <!-- Global Markets -->
    <div class="mb-10">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold flex items-center gap-2">
          <span>📊</span> GLOBAL MARKETS
        </h2>
        <span class="text-sm text-gray-400">as of now</span>
      </div>

      <div id="markets" class="space-y-4"></div>
    </div>

    <!-- Crypto -->
    <div>
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold flex items-center gap-2">
          <span class="text-orange-400">₿</span> CRYPTO
        </h2>
        <span class="text-sm text-gray-400">24h change • 1D chart</span>
      </div>
      <div id="crypto" class="space-y-4"></div>
    </div>
  </div>

  <script>
    async function loadData() {
      // Global Markets
      const marketSymbols = [
        { id: "^GSPC", name: "S&P 500" },
        { id: "^DJI", name: "DOW JONES" },
        { id: "^IXIC", name: "NASDAQ" }
      ];

      const marketsDiv = document.getElementById('markets');
      for (let m of marketSymbols) {
        try {
          const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${m.id}?interval=5m&range=1d`);
          const data = await res.json();
          const meta = data.chart?.result?.[0]?.meta || {};
          const price = meta.regularMarketPrice || 5800;
          const prev = meta.chartPreviousClose || price * 0.99;

          const change = price - prev;
          const pct = (change / prev) * 100;

          marketsDiv.innerHTML += `
            <div class="bg-gray-900 rounded-3xl p-6">
              <div class="flex justify-between">
                <div>
                  <div class="font-semibold text-lg">${m.name}</div>
                  <div class="text-4xl font-mono mt-2">${price.toLocaleString()}</div>
                </div>
                <div class="text-right">
                  <div class="${change >= 0 ? 'text-green-400' : 'text-red-400'} font-medium">
                    ${change >= 0 ? '↑' : '↓'} ${pct.toFixed(2)}%
                  </div>
                  <div class="text-sm text-gray-400 mt-1">Prev ${prev.toFixed(2)}</div>
                </div>
              </div>
              <div class="mt-4 h-16 bg-gray-800 rounded-2xl"></div>
            </div>`;
        } catch(e) {}
      }

      // Crypto
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana,zcash&sparkline=true&price_change_percentage=24h');
        const coins = await res.json();
        const cryptoDiv = document.getElementById('crypto');

        coins.forEach(coin => {
          const change = coin.price_change_percentage_24h || 0;
          cryptoDiv.innerHTML += `
            <div class="bg-gray-900 rounded-3xl p-6 flex justify-between items-center">
              <div class="flex items-center gap-4">
                <div class="text-4xl">₿</div>
                <div>
                  <div class="font-semibold">${coin.name}</div>
                  <div class="text-sm text-gray-400">${coin.symbol.toUpperCase()}</div>
                </div>
              </div>
              <div class="text-right">
                <div class="text-3xl font-mono">$${coin.current_price.toLocaleString()}</div>
                <div class="${change >= 0 ? 'text-green-400' : 'text-red-400'}">
                  ${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                </div>
              </div>
            </div>`;
        });
      } catch(e) {}
    }

    window.onload = loadData;
  </script>
</body>
</html>
