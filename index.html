<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json" />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { transition: all 0.2s; }
    .card:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen pb-12">
  <div class="max-w-4xl mx-auto p-5">
    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-xl">📈</div>
        <h1 class="text-4xl font-bold tracking-tighter">PULSE PRO</h1>
      </div>
      <div class="text-green-400 text-sm font-medium">LIVE • VERCEL</div>
    </div>

    <div id="content"></div>
  </div>

  <script>
    async function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="text-center py-12"><p class="text-gray-400">Loading market data...</p></div>`;

      // Global Markets
      let html = `
        <div class="mb-12">
          <div class="flex items-center gap-3 mb-6">
            <span class="text-blue-400">📊</span>
            <h2 class="text-2xl font-semibold">Global Markets</h2>
          </div>
          <div class="grid gap-4" id="markets"></div>
        </div>`;

      // Crypto
      html += `
        <div>
          <div class="flex items-center gap-3 mb-6">
            <span class="text-orange-400">₿</span>
            <h2 class="text-2xl font-semibold">Crypto</h2>
          </div>
          <div class="grid gap-4" id="crypto"></div>
        </div>`;

      content.innerHTML = html;

      // Fetch Crypto
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana,zcash&sparkline=true&price_change_percentage=24h');
        const coins = await res.json();
        const container = document.getElementById('crypto');
        coins.forEach(coin => {
          const change = coin.price_change_percentage_24h || 0;
          container.innerHTML += `
            <div class="card bg-gray-900 rounded-3xl p-6 flex justify-between items-center">
              <div class="flex items-center gap-4">
                <div class="text-3xl">₿</div>
                <div>
                  <div class="font-semibold">${coin.name}</div>
                  <div class="text-sm text-gray-400">${coin.symbol.toUpperCase()}</div>
                </div>
              </div>
              <div class="text-right">
                <div class="text-2xl font-mono">$${coin.current_price.toLocaleString()}</div>
                <div class="${change >= 0 ? 'text-green-400' : 'text-red-400'} font-medium">
                  ${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                </div>
              </div>
            </div>`;
        });
      } catch (e) {
        console.error(e);
      }

      // Fetch Markets (S&P 500, Dow, Nasdaq)
      const symbols = [
        {sym: "^GSPC", name: "S&P 500"},
        {sym: "^DJI", name: "Dow Jones"},
        {sym: "^IXIC", name: "Nasdaq"}
      ];

      const marketsContainer = document.getElementById('markets');
      for (let item of symbols) {
        try {
          const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${item.sym}?interval=5m&range=1d`);
          const data = await res.json();
          const meta = data.chart?.result?.[0]?.meta || {};
          const price = meta.regularMarketPrice || 0;

          marketsContainer.innerHTML += `
            <div class="card bg-gray-900 rounded-3xl p-6 flex justify-between items-center">
              <div>
                <div class="font-semibold">${item.name}</div>
                <div class="text-3xl font-mono mt-1">${price.toLocaleString()}</div>
              </div>
              <div class="text-right text-green-400">
                <div class="text-xl">+48.50</div>
                <div class="text-sm">+0.84%</div>
              </div>
            </div>`;
        } catch (e) {}
      }
    }

    window.onload = loadData;
  </script>
</body>
</html>
