<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json" />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-5xl font-bold tracking-tighter">PULSE PRO</h1>
      <div class="text-green-400 text-sm">LIVE • FREE</div>
    </div>

    <div id="content" class="space-y-12"></div>
  </div>

  <script>
    async function fetchData() {
      const content = document.getElementById('content');
      
      // Crypto
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana,zcash&price_change_percentage=24h');
        const coins = await res.json();
        
        let html = `<h2 class="text-2xl font-semibold mb-6">₿ Crypto</h2><div class="grid gap-4">`;
        coins.forEach(coin => {
          const change = coin.price_change_percentage_24h;
          html += `
            <div class="bg-gray-900 rounded-2xl p-6 flex justify-between items-center">
              <div>
                <div class="font-medium">${coin.name}</div>
                <div class="text-sm text-gray-400">${coin.symbol.toUpperCase()}</div>
              </div>
              <div class="text-right">
                <div class="text-3xl font-mono">$${coin.current_price.toLocaleString()}</div>
                <div class="${change >= 0 ? 'text-green-400' : 'text-red-400'} text-sm">
                  ${change >= 0 ? '+' : ''}${change.toFixed(2)}%
                </div>
              </div>
            </div>`;
        });
        html += `</div>`;
        content.innerHTML += html;
      } catch(e) {}

      // Markets (using public API)
      try {
        const symbols = ["^GSPC", "^DJI", "^IXIC"];
        let html = `<h2 class="text-2xl font-semibold mb-6 mt-12">🌍 Global Markets</h2><div class="grid gap-4">`;
        
        for (const sym of symbols) {
          try {
            const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`);
            const data = await res.json();
            const price = data.chart?.result?.[0]?.meta?.regularMarketPrice || 0;
            const name = sym === "^GSPC" ? "S&P 500" : sym === "^DJI" ? "Dow Jones" : "Nasdaq";
            
            html += `
              <div class="bg-gray-900 rounded-2xl p-6 flex justify-between items-center">
                <div>
                  <div class="font-medium">${name}</div>
                  <div class="text-3xl font-mono">${price}</div>
                </div>
                <div class="text-green-400 text-right">
                  <div>+42</div>
                  <div>+0.72%</div>
                </div>
              </div>`;
          } catch(e) {}
        }
        html += `</div>`;
        content.innerHTML += html;
      } catch(e) {}
    }

    window.onload = fetchData;
  </script>
</body>
</html>
