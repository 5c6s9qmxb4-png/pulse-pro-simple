<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json" />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .sparkline { height: 48px; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen pb-20">
  <div class="max-w-4xl mx-auto p-5">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl">📈</div>
        <h1 class="text-4xl font-bold tracking-tighter">PULSE PRO</h1>
      </div>
      <div class="flex items-center gap-2 text-green-400">
        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
        LIVE
      </div>
    </div>

    <!-- Global Markets -->
    <div class="mb-12">
      <h2 class="text-xl font-semibold mb-6 flex items-center gap-3">
        <span class="text-blue-400">📊</span> GLOBAL MARKETS
      </h2>
      <div id="markets" class="space-y-4"></div>
    </div>

    <!-- Crypto -->
    <div class="mb-12">
      <h2 class="text-xl font-semibold mb-6 flex items-center gap-3">
        <span class="text-orange-400">₿</span> CRYPTO • 24h change • 1D chart
      </h2>
      <div id="crypto" class="space-y-4"></div>
    </div>

    <!-- News -->
    <div>
      <h2 class="text-xl font-semibold mb-6 flex items-center gap-3">
        <span>📰</span> NEWS
      </h2>
      <div id="news" class="space-y-6 text-sm"></div>
    </div>
  </div>

  <script>
    // Tailwind script already loaded

    async function loadMarkets() {
      const symbols = [
        {id: "^GSPC", name: "S&P 500"},
        {id: "^DJI", name: "DOW JONES"},
        {id: "^IXIC", name: "NASDAQ"}
      ];

      const container = document.getElementById('markets');
      for (let s of symbols) {
        try {
          const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${s.id}?interval=5m&range=1d`);
          const data = await res.json();
          const meta = data.chart?.result?.[0]?.meta || {};
          const price = meta.regularMarketPrice || 0;
          const prev = meta.chartPreviousClose || price * 0.99;
          const change = price - prev;
          const pct = (change / prev) * 100;

          container.innerHTML += `
            <div class="bg-gray-900 rounded-3xl p-6">
              <div class="flex justify-between items-start">
                <div>
                  <div class="font-semibold">${s.name}</div>
                  <div class="text-4xl font-mono mt-1">${price.toLocaleString()}</div>
                </div>
                <div class="text-right">
                  <div class="${change >= 0 ? 'text-green-400' : 'text-red-400'} font-medium">
                    ${change >= 0 ? '↑' : '↓'} ${pct.toFixed(2)}%
                  </div>
                  <div class="text-sm text-gray-400">Prev ${prev.toFixed(2)}</div>
                </div>
              </div>
              <div class="mt-4 h-14 bg-gray-800 rounded-2xl flex items-end px-4">
                <div class="text-xs text-gray-500">1D Sparkline</div>
              </div>
            </div>`;
        } catch(e) {}
      }
    }

    async function loadCrypto() {
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana,zcash&sparkline=true&price_change_percentage=24h');
        const coins = await res.json();
        const container = document.getElementById('crypto');

        coins.forEach(coin => {
          const change = coin.price_change_percentage_24h || 0;
          container.innerHTML += `
            <div class="bg-gray-900 rounded-3xl p-6 flex justify-between items-center">
              <div class="flex items-center gap-4">
                <div class="text-4xl">₿</div>
                <div>
                  <div class="font-semibold">${coin.name}</div>
                  <div class="text-sm text-gray-400">${coin.symbol.toUpperCase()}</div>
                </div>
              </div>
              <div class="text-right">
                <div class="text-3xl font-mono">$${coin.current_price.toLocaleString()}</div>
                <div class="${change >= 0 ? 'text-green-400' : 'text-red-400'}">
                  ${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                </div>
              </div>
            </div>`;
        });
      } catch(e) {}
    }

    // Simple News (static for now, can be expanded)
    function loadNews() {
      const newsHTML = `
        <div class="bg-gray-900 rounded-3xl p-6">
          <h3 class="font-semibold mb-4">Finance & Disruptive Tech</h3>
          <div class="space-y-6 text-sm">
            <div>
              <div class="font-medium">Nvidia embraces role of AI investor...</div>
              <div class="text-gray-400 text-xs mt-1">2h ago</div>
            </div>
            <div>
              <div class="font-medium">China consumer inflation tops estimates...</div>
              <div class="text-gray-400 text-xs mt-1">9h ago</div>
            </div>
          </div>
        </div>`;
      document.getElementById('news').innerHTML = newsHTML;
    }

    window.onload = () => {
      loadMarkets();
      loadCrypto();
      loadNews();
    };
  </script>
</body>
</html>
